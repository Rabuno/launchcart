name: Deploy Production

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]

jobs:
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
      - name: Health check
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://launchcart-gamma.vercel.app)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          VERSION="${{ github.ref_name }}"
          MSG="🚀 Production deploy $VERSION: $STATUS%0ARepo: ${{ github.repository }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" || true

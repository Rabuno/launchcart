name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (Staging)
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          alias-domains: |
            staging.launchcart.vercel.app
      - name: Smoke test
        run: |
          sleep 30
          curl -sf https://staging.launchcart.vercel.app || exit 1
          echo "✅ Staging is up!"
      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          MSG="🚀 Staging deploy: $STATUS%0ARepo: ${{ github.repository }}%0ACommit: ${{ github.sha }}"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=HTML" || true
